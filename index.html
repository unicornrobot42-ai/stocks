    function loadDashboard() {
      fetch('watchlist.json')
        .then(r => r.json())
        .then(data => {
          const stocks = data.hot || [];
          const grid = document.getElementById('stocks-grid');
          grid.innerHTML = '';
          
          stocks.forEach(stock => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const statusClass = stock.status === 'FRESH' ? 'status-fresh' : 'status-imminent';
            const statusText = stock.status === 'FRESH' ? '🟢 FRESH' : '🔴 IMMINENT';
            const gapText = stock.gap > 0 ? `+${stock.gap.toFixed(2)}%` : `${stock.gap.toFixed(2)}%`;
            const gapClass = stock.gap > 0 ? 'positive' : 'negative';
            
            card.innerHTML = `
              <div class="card-header">
                <div class="card-title">${stock.ticker}</div>
                <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="stats">
                <div><div class="stat-label">Price</div><div class="stat-value">$${stock.price.toFixed(2)}</div></div>
                <div><div class="stat-label">Gap</div><div class="stat-value ${gapClass}">${gapText}</div></div>
                <div><div class="stat-label">EMA9</div><div class="stat-value">$${stock.ema9.toFixed(2)}</div></div>
                <div><div class="stat-label">EMA27</div><div class="stat-value">$${stock.ema27.toFixed(2)}</div></div>
              </div>
              <div class="chart-container">
                <canvas id="chart-${stock.ticker}"></canvas>
              </div>
            `;
            
            grid.appendChild(card);
            renderChart(stock.ticker);
          });
          
          document.getElementById('timestamp').textContent = `Last updated: ${new Date().toLocaleString()}`;
        })
        .catch(e => console.log('Error:', e));
    }
    
    function calculateEMA(prices, period) {
      const ema = [];
      const k = 2 / (period + 1);
      let sma = prices.slice(0, period).reduce((a, b) => a + b) / period;
      ema[period - 1] = sma;
      
      for (let i = period; i < prices.length; i++) {
        sma = prices[i] * k + sma * (1 - k);
        ema[i] = sma;
      }
      return ema;
    }
    
    function renderChart(ticker) {
      const data = PRICE_DATA[ticker];
      if (!data) return;
      
      const canvas = document.getElementById(`chart-${ticker}`);
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      const openPrice = data.prices[0];
      
      // Calculate EMAs
      const ema9 = calculateEMA(data.prices, 9);
      const ema27 = calculateEMA(data.prices, 27);
      
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.labels,
          datasets: [
            {
              label: 'EMA9',
              data: ema9,
              borderColor: '#60a5fa',
              borderWidth: 2,
              tension: 0.3,
              fill: false,
              pointRadius: 0
            },
            {
              label: 'EMA27',
              data: ema27,
              borderColor: '#f59e0b',
              borderWidth: 2,
              tension: 0.3,
              fill: false,
              pointRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { 
              display: true,
              labels: { color: '#999', font: { size: 11 } }
            },
            tooltip: {
              callbacks: {
                afterLabel: function(context) {
                  if (context.datasetIndex === 0) return `Open: $${openPrice.toFixed(2)}`;
                }
              }
            }
          },
          scales: {
            y: { beginAtZero: false, grid: { color: '#1f2937' }, ticks: { color: '#666' } },
            x: { grid: { display: false }, ticks: { color: '#666' } }
          }
        }
      });
    }
    
    loadDashboard();
  </script>
