<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Trading Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e0e6ed; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { margin-bottom: 30px; }
    .header h1 { font-size: 32px; margin-bottom: 8px; }
    .timestamp { color: #888; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .card { background: #1a1f2e; border: 1px solid #333; border-radius: 8px; padding: 20px; }
    .card-title { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    .stat { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; }
    .stat-label { color: #aaa; }
    .stat-value { font-weight: 600; }
    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .chart { margin-top: 20px; }
    canvas { max-height: 250px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Trading Dashboard</h1>
      <div class="timestamp" id="timestamp"></div>
    </div>
    <div class="grid" id="stocks-grid"></div>
  </div>

  <script>
    // Load from watchlist.json (15 verified stocks)
    fetch('watchlist.json')
      .then(response => response.json())
      .then(data => {
        const stocks = data.hot || [];
        const grid = document.getElementById('stocks-grid');
        
        stocks.forEach(stock => {
          const card = document.createElement('div');
          card.className = 'card';
          
          const gapClass = stock.gap > 0 ? 'positive' : stock.gap < 0 ? 'negative' : '';
          const gapText = stock.gap > 0 ? `Fresh Cross • +${stock.gap.toFixed(2)}%` : `Imminent • ${stock.gap.toFixed(2)}%`;
          
          card.innerHTML = `
            <div class="card-title">${stock.ticker}</div>
            <div class="stat">
              <span class="stat-label">Price</span>
              <span class="stat-value">$${stock.price.toFixed(2)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">EMA9</span>
              <span class="stat-value">$${stock.ema9.toFixed(2)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">EMA27</span>
              <span class="stat-value">$${stock.ema27.toFixed(2)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Status</span>
              <span class="stat-value ${gapClass}">${gapText}</span>
            </div>
          `;
          
          grid.appendChild(card);
        });
        
        if (stocks.length === 0) {
          grid.innerHTML = '<div class="card"><p>No verified prospects. Check back tomorrow at 6 AM PST.</p></div>';
        }
        
        document.getElementById('timestamp').textContent = `Last updated: ${new Date().toLocaleString()}`;
      })
      .catch(err => {
        document.getElementById('stocks-grid').innerHTML = '<div class="card"><p>Error loading watchlist. Please check back soon.</p></div>';
      });
  </script>
</body>
</html>
