<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Dashboard - Positions & Screener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f26 100%);
      color: #e0e0e0;
      padding: 30px 20px;
      min-height: 100vh;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    h1 { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .timestamp { color: #888; font-size: 13px; margin-bottom: 30px; }
    .section { margin-bottom: 50px; }
    .section-title {
      font-size: 24px; font-weight: 700; color: #fff;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 2px solid rgba(77, 166, 255, 0.3);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
    .card {
      background: rgba(26, 31, 38, 0.8);
      border: 1px solid rgba(68, 98, 122, 0.3);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .ticker { font-size: 22px; font-weight: 700; color: #4da6ff; margin-bottom: 10px; }
    .metric { font-size: 12px; color: #888; margin: 8px 0; }
    .value { font-weight: bold; color: #e0e0e0; }
    .positive { color: #4ade80; }
    .negative { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Trading Dashboard</h1>
      <div class="timestamp">Updated: Tuesday, March 3, 2026 - 6:35 AM PST</div>
    </div>

    <!-- HOLDINGS SECTION -->
    <div class="section">
      <div class="section-title">📈 Current Holdings (3)</div>
      <div class="grid" id="holdings"></div>
    </div>

    <!-- SCREENER SECTION -->
    <div class="section">
      <div class="section-title">🔍 Screener - Approaching Crossover (8)</div>
      <div class="grid" id="screener"></div>
    </div>
  </div>

  <script>
    const portfolio = {
      "NFLX": {
        "entry": 97.67,
        "shares": 3,
        "allocated": 293.01,
        "stopLoss": 95.00,
        "target5": 102.55,
        "target10": 107.44,
        "target20": 117.20
      },
      "MRVL": {
        "entry": 77.83,
        "shares": 3,
        "allocated": 233.49,
        "stopLoss": 76.00,
        "target5": 81.72,
        "target10": 85.61,
        "target20": 93.40
      },
      "TMDX": {
        "entry": 143.72,
        "shares": 2,
        "allocated": 287.44,
        "stopLoss": 140.00,
        "target5": 150.91,
        "target10": 158.09,
        "target20": 172.46
      }
    };

    const screener = [
      { "ticker": "NVDA", "current": 182.48, "ma9": 182.32, "ma27": 182.49, "gap": -0.09, "type": "IMMINENT" },
      { "ticker": "SPOT", "current": 507.28, "ma9": 506.85, "ma27": 507.15, "gap": -0.06, "type": "IMMINENT" },
      { "ticker": "LLY", "current": 1017.97, "ma9": 1015.48, "ma27": 1021.45, "gap": -0.58, "type": "IMMINENT" },
      { "ticker": "META", "current": 653.56, "ma9": 650.82, "ma27": 657.23, "gap": -0.97, "type": "IMMINENT" },
      { "ticker": "JPM", "current": 297.56, "ma9": 295.22, "ma27": 299.61, "gap": -1.45, "type": "IMMINENT" },
      { "ticker": "AVGO", "current": 318.82, "ma9": 315.88, "ma27": 321.43, "gap": -1.63, "type": "EARLY" },
      { "ticker": "V", "current": 320.51, "ma9": 317.22, "ma27": 322.72, "gap": -1.67, "type": "EARLY" },
      { "ticker": "GOOGL", "current": 306.52, "ma9": 302.94, "ma27": 309.29, "gap": -1.79, "type": "EARLY" }
    ];

    function renderHoldings() {
      const container = document.getElementById('holdings');
      Object.entries(portfolio).forEach(([ticker, config]) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="ticker">${ticker}</div>
          <div class="metric">Entry: <span class="value">$${config.entry.toFixed(2)}</span></div>
          <div class="metric">Shares: <span class="value">${config.shares}</span></div>
          <div class="metric">Allocated: <span class="value">$${config.allocated.toFixed(2)}</span></div>
          <div class="metric">Stop Loss: <span class="value">$${config.stopLoss.toFixed(2)}</span></div>
          <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(68, 98, 122, 0.2);">
            <div style="font-size: 11px; color: #888; margin-bottom: 8px;">TARGETS</div>
            <div class="metric">+5%: <span class="value">$${config.target5.toFixed(2)}</span></div>
            <div class="metric">+10%: <span class="value">$${config.target10.toFixed(2)}</span></div>
            <div class="metric">+20%: <span class="value">$${config.target20.toFixed(2)}</span></div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderScreener() {
      const container = document.getElementById('screener');
      screener.forEach(stock => {
        const card = document.createElement('div');
        card.className = 'card';
        const gapClass = stock.gap >= 0 ? 'positive' : 'negative';
        card.innerHTML = `
          <div class="ticker">${stock.ticker}</div>
          <div class="metric">Price: <span class="value">$${stock.current.toFixed(2)}</span></div>
          <div class="metric">MA9: <span class="value">$${stock.ma9.toFixed(2)}</span></div>
          <div class="metric">MA27: <span class="value">$${stock.ma27.toFixed(2)}</span></div>
          <div class="metric">Gap: <span class="value ${gapClass}">${stock.gap.toFixed(2)}%</span></div>
          <div class="metric" style="margin-top: 10px;">Type: <span class="value">${stock.type}</span></div>
        `;
        container.appendChild(card);
      });
    }

    renderHoldings();
    renderScreener();
  </script>
</body>
</html>
