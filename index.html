    .legend-dot { width: 8px; height: 8px; border-radius: 1px; }

    .position-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; margin-bottom: 8px; }

    let chartInstances = {};

    function calculateMA(prices, days) {
      const ma = [];
      for (let i = 0; i < prices.length; i++) {
        if (i < days - 1) {
          ma.push(null);
        } else {
          const sum = prices.slice(i - days + 1, i + 1).reduce((a, b) => a + b, 0);
          ma.push(sum / days);
        }
      }
      return ma;
    }

    function renderMAChart(canvasId, prices) {
      const ma9 = calculateMA(prices, 9);
      const ma27 = calculateMA(prices, 27);
      const days = Array.from({ length: prices.length }, (_, i) => i + 1).reverse();

      const ctx = document.getElementById(canvasId).getContext('2d');
      if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

      chartInstances[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: days,
          datasets: [
            { label: '9-Day MA', data: ma9, borderColor: 'rgba(74, 222, 128, 0.8)', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 0 },
            { label: '27-Day MA', data: ma27, borderColor: 'rgba(249, 115, 22, 0.8)', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 0 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
      });
    }

    function renderVolumeChart(canvasId, volumes) {
      const avgVolume = volumes.reduce((a, b) => a + b) / volumes.length;
      const buyVolumes = volumes.map(v => v >= avgVolume ? v : 0);
      const sellVolumes = volumes.map(v => v < avgVolume ? -v : 0);
      const days = Array.from({ length: volumes.length }, (_, i) => i + 1).reverse();

      const ctx = document.getElementById(canvasId).getContext('2d');
      if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

      chartInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: days,
          datasets: [
            { label: 'Buy Volume', data: buyVolumes, backgroundColor: 'rgba(74, 222, 128, 0.7)', barThickness: 'flex', maxBarThickness: 3 },
            { label: 'Sell Volume', data: sellVolumes, backgroundColor: 'rgba(248, 113, 113, 0.7)', barThickness: 'flex', maxBarThickness: 3 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { stacked: false, display: false }, x: { stacked: false, display: false } } }
      });
    }

    function calculateHeat(prices, volumes) {
      const ma9 = calculateMA(prices, 9)[prices.length - 1];
      const ma27 = calculateMA(prices, 27)[prices.length - 1];
      const gap = ((ma9 - ma27) / ma27 * 100);
      const vol20 = volumes.slice(0, 20).reduce((a, b) => a + b) / 20;
      const volRatio = volumes[0] / vol20;

      let score = 0;
      if (gap > 0 && gap <= 5) score += 40;
      else if (gap >= -5 && gap < 0) score += 30;
      else if (gap > 5 && gap <= 15) score += 20;

      if (volRatio >= 1.3) score += 30;
      else if (volRatio >= 1.2) score += 20;
      else if (volRatio >= 1.1) score += 10;

      return { score, gap, volRatio: volRatio.toFixed(2) };
    }

    function getHeatLevel(score) {
      if (score >= 85) return 5;
      if (score >= 70) return 4;
      if (score >= 55) return 3;
      if (score >= 40) return 2;
      if (score >= 20) return 1;
      return 0;
    }

    function getHeatLabel(level) {
      const labels = ['DO NOT BUY', 'COOL', 'NEUTRAL', 'WARM', 'HOT', '🔥 ULTRA HOT'];
      return labels[level];
    }

    function renderHoldings() {
      const container = document.getElementById('holdings-grid');
      Object.entries(portfolio).forEach(([ticker, config]) => {
        const card = document.createElement('div');
        card.className = 'stock-card';
        card.innerHTML = `
          <div class="card-header">
            <div class="ticker">${ticker}</div>
          </div>
          <div class="details">
            <div class="detail-row">
              <span class="label">Entry:</span>
              <span class="value">$${config.entry.toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="label">Shares:</span>
              <span class="value">${config.shares}</span>
            </div>
            <div class="detail-row">
              <span class="label">Allocated:</span>
              <span class="value">$${config.allocated.toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="label">Stop Loss:</span>
              <span class="value" style="color: #f87171;">$${config.stopLoss.toFixed(2)}</span>
            </div>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(68, 98, 122, 0.2);">
              <div style="font-size: 11px; color: #888; margin-bottom: 8px;">TARGETS</div>
              <div class="detail-row">
                <span class="label">+5%:</span>
                <span class="value" style="color: #4ade80;">$${config.targets[0].toFixed(2)}</span>
              </div>
              <div class="detail-row">
                <span class="label">+10%:</span>
                <span class="value" style="color: #4ade80;">$${config.targets[1].toFixed(2)}</span>
              </div>
              <div class="detail-row">
                <span class="label">+20%:</span>
                <span class="value" style="color: #4ade80;">$${config.targets[2].toFixed(2)}</span>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    const stocks = Object.keys(realData).map(ticker => {
      const data = realData[ticker];
      const history = data.history || [data.price];
      const volume = data.volume || Array(90).fill(10000000);
      const metrics = calculateHeat(history, volume);
      const heatLevel = getHeatLevel(metrics.score);

      return {
        ticker,
        price: data.price,
        history,
        volume,
        gap: metrics.gap.toFixed(2),
        volRatio: metrics.volRatio,
        score: metrics.score,
        heatLevel
      };
    }).sort((a, b) => b.score - a.score);

    const container = document.getElementById('watchList');
    stocks.forEach(stock => {
      const card = document.createElement('div');
      card.className = `watch-card heat-${stock.heatLevel}`;
      const maChartId = `ma-${stock.ticker}`;
      const volChartId = `vol-${stock.ticker}`;
      const flamHTML = stock.heatLevel === 5 ? '<div class="flames"><div class="flame">🔥</div><div class="flame">🔥</div><div class="flame">🔥</div></div>' : '';

      card.innerHTML = `
        ${flamHTML}
        <div class="watch-header">
          <span class="watch-ticker">${stock.ticker}</span>
          <span class="heat-indicator heat-${stock.heatLevel}">${getHeatLabel(stock.heatLevel)}</span>
        </div>
        <div class="watch-price">$${stock.price.toFixed(2)}</div>
        <div class="watch-meta">
          <div class="meta-item"><div class="meta-label">Gap</div><div class="meta-value">${stock.gap}%</div></div>
          <div class="meta-item"><div class="meta-label">Vol Ratio</div><div class="meta-value">${stock.volRatio}x</div></div>
        </div>
        <div class="charts-section">
          <div class="chart-label">
            <span>9-Day vs 27-Day MA</span>
            <div class="chart-legend">
              <div class="legend-item"><div class="legend-dot" style="background: rgba(74, 222, 128, 0.7);"></div><span>9-Day</span></div>
              <div class="legend-item"><div class="legend-dot" style="background: rgba(249, 115, 22, 0.7);"></div><span>27-Day</span></div>
            </div>
          </div>
          <div class="chart-container"><canvas id="${maChartId}"></canvas></div>
          <div class="chart-label">
            <span>Volume (Above/Below Avg)</span>
            <div class="chart-legend">
              <div class="legend-item"><div class="legend-dot buy" style="background: rgba(74, 222, 128, 0.7);"></div><span>Buy</span></div>
              <div class="legend-item"><div class="legend-dot sell" style="background: rgba(248, 113, 113, 0.7);"></div><span>Sell</span></div>
            </div>
          </div>
          <div class="chart-container"><canvas id="${volChartId}"></canvas></div>
        </div>
        <div class="position-inputs">
          <div class="input-group">
            <div class="input-label">Qty</div>
            <input type="number" id="qty-${stock.ticker}" placeholder="0" step="0.01">
          </div>
          <div class="input-group">
            <div class="input-label">Entry $</div>
            <input type="number" id="entry-${stock.ticker}" placeholder="0.00" step="0.01">
          </div>
        </div>
        <button class="btn-add" onclick="console.log('Position: ${stock.ticker}')">Add Position</button>
      `;
      container.appendChild(card);

      setTimeout(() => {
        renderMAChart(maChartId, stock.history);
        renderVolumeChart(volChartId, stock.volume);
      }, 100);
    });

    // Render holdings at page load
    renderHoldings();
  </script>
